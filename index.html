<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GEPT 單字複習小工具</title>
    <meta name="theme-color" content="#8839ef" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb"></div>
    <div class="bg-orb bg-orb-2"></div>
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <div class="brand-text">
          <div class="brand-title">GEPT 單字複習小工具</div>
          <div class="brand-subtitle">
            <a class="github-link" href="https://github.com/EarthlyEric/GEPT-Particle" target="_blank" rel="noreferrer" aria-label="GitHub 連結">
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path>
              </svg>
            </a>
            <span class="subtitle-sep" aria-hidden="true">‧</span>
            <span class="status-inline" id="status">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="statusText">準備中</span>
            </span>
          </div>
        </div>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="選單">
        <span class="menu-icon"></span>
      </button>
      <div class="header-actions" id="headerActions">
        <button class="btn btn-outlined" id="themeToggle">深色模式</button>
        <button class="btn btn-tonal" id="drawerToggle">總表</button>
        <button class="btn btn-outlined" id="shuffle">隨機</button>
      </div>
    </header>

    <main class="app-main">
      <section class="card-panel" aria-live="polite">
        <div class="card" id="card">
          <div class="card-badge" id="cardBadge"></div>
          <div class="card-header">
            <div class="chip" id="pos"></div>
            <div class="chip chip-secondary" id="level"></div>
          </div>
          <div class="card-body">
            <div class="word" id="word">載入中...</div>
            <div class="meaning" id="meaning"></div>
            <div class="note" id="note"></div>
          </div>
          <div class="card-footer">
            <div class="meta" id="academic"></div>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-info">
          <span id="progressText">0 / 0</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-outlined" id="prev">上一個</button>
          <button class="btn btn-filled" id="next">下一個</button>
          <button class="btn btn-tonal" id="familiar">熟悉</button>
          <button class="btn btn-outlined" id="unfamiliar">不熟</button>
        </div>
      </section>

      <section class="options-panel">
        <details class="options-details">
          <summary class="options-summary">選項與統計</summary>
          <div class="stats-panel">
            <div class="stats-card">
              <div class="stats-title">篩選</div>
              <div class="filter-group">
                <label class="filter-label" for="filterLevel">級數</label>
                <select class="filter-select" id="filterLevel"></select>
              </div>
              <div class="filter-group">
                <label class="filter-label" for="filterAcademic">學術字彙</label>
                <select class="filter-select" id="filterAcademic"></select>
              </div>
              <div class="filter-toggle">
                <input type="checkbox" id="filterUnfamiliar" />
                <label for="filterUnfamiliar">只看不熟</label>
              </div>
              <div class="filter-toggle">
                <input type="checkbox" id="autoSkipFamiliar" />
                <label for="autoSkipFamiliar">已熟跳過</label>
              </div>
              <button class="btn btn-outlined" id="clearProgress">清除進度</button>
            </div>
            <div class="stats-card">
              <div class="stats-title">本次進度</div>
              <div class="stats-row">
                <span>總庫題數</span>
                <strong id="totalAllCount">0</strong>
              </div>
              <div class="stats-row">
                <span>符合篩選</span>
                <strong id="totalCount">0</strong>
              </div>
              <div class="stats-row">
                <span>已看題數</span>
                <strong id="seenCount">0</strong>
              </div>
              <div class="stats-row">
                <span>熟悉</span>
                <strong id="familiarCount">0</strong>
              </div>
              <div class="stats-row">
                <span>不熟</span>
                <strong id="unfamiliarCount">0</strong>
              </div>
            </div>
            <div class="stats-card">
              <div class="stats-title">匯入 / 匯出</div>
              <div class="import-export-group">
                <button class="btn btn-outlined" id="exportBtn">匯出進度</button>
                <label class="btn btn-tonal import-label">
                  匯入進度
                  <input type="file" id="importFile" accept=".json" hidden />
                </label>
              </div>
            </div>
          </div>
        </details>
      </section>
    </main>

    <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-header">
        <div>
          <div class="drawer-title">單字總表</div>
          <div class="drawer-subtitle">目前顯示：<span id="drawerCount">0</span> 筆</div>
        </div>
        <button class="btn btn-outlined" id="drawerClose">關閉</button>
      </div>
      <div class="drawer-body">
        <table class="drawer-table">
          <thead>
            <tr>
              <th>狀態</th>
              <th>字彙</th>
              <th>詞類</th>
              <th>中文</th>
              <th>註解</th>
              <th>級數</th>
              <th>學術字彙</th>
            </tr>
          </thead>
          <tbody id="drawerTableBody"></tbody>
        </table>
      </div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
